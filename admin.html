<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — vpknbr</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0ede8; --surface: #fff; --border: #e2e2de; --border-s: #c8c8c4;
      --text: #1a1a18; --text-s: #6b6b68; --text-t: #a0a09c;
      --info-bg: #e8f0fe; --info-text: #1a4bbd; --info-border: #b8d0fc;
      --success-bg: #e6f7ee; --success-text: #0f6b35;
      --danger: #b01c1c; --danger-bg: #fdecea;
      --r: 10px; --rs: 6px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 1.5rem 1rem 5rem; }
    .app { max-width: 540px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 1.75rem; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header p { font-size: 13px; color: var(--text-s); margin-top: 3px; }
    .badge { display: inline-block; font-size: 11px; font-weight: 700; background: #1a4bbd; color: #fff; padding: 2px 8px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
    .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1.25rem; margin-bottom: 12px; }
    .sec-title { font-size: 11px; font-weight: 700; color: var(--text-s); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
    .paste-area { width: 100%; min-height: 120px; padding: 10px 12px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--rs); background: #fafaf9; color: var(--text); font-family: inherit; resize: vertical; line-height: 1.6; }
    .paste-area:focus { outline: none; border-color: #1a1a18; }
    .btn-parse { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px; margin-top: 8px; background: #1a1a18; color: #fff; border: none; border-radius: var(--rs); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-parse:hover { background: #333; }
    .info-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 13px; }
    .info-label { color: var(--text-s); font-weight: 500; white-space: nowrap; padding: 3px 0; }
    .info-value { color: var(--text); padding: 3px 0; }
    input[type=text], input[type=number], textarea { width: 100%; padding: 9px 11px; font-size: 14px; border: 1px solid var(--border); border-radius: var(--rs); background: #fafaf9; color: var(--text); font-family: inherit; }
    input:focus, textarea:focus { outline: none; border-color: #1a1a18; }

    /* Product table */
    .prod-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .prod-table th { font-size: 11px; color: var(--text-s); font-weight: 600; padding: 0 5px 8px; text-align: left; border-bottom: 1px solid var(--border); }
    .prod-table th.r { text-align: right; }
    .prod-table td { padding: 6px 5px; vertical-align: top; border-bottom: 1px solid var(--border); }
    .prod-table td.r { text-align: right; }
    .prod-name { font-size: 13px; color: var(--text); line-height: 1.4; }
    .prod-qty { font-size: 13px; color: var(--text-s); text-align: center; }
    .price-input { width: 100%; padding: 6px 7px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--rs); background: #fafaf9; color: var(--text); font-family: inherit; text-align: right; }
    .price-input:focus { outline: none; border-color: #1a1a18; }
    .subtotal-cell { font-size: 13px; font-weight: 600; color: var(--text); text-align: right; }
    .disc-cell { padding-top: 4px; }

    /* Diskon per item */
    .item-disc-wrap { display: flex; align-items: center; gap: 3px; margin-top: 4px; }
    .item-disc-input { width: 62px; padding: 4px 6px; font-size: 12px; border: 1px solid var(--border); border-radius: var(--rs); background: #fafaf9; color: var(--text); font-family: inherit; text-align: right; }
    .item-disc-input:focus { outline: none; border-color: #1a1a18; }
    .toggle-wrap { display: flex; border: 1px solid var(--border); border-radius: var(--rs); overflow: hidden; }
    .toggle-btn { padding: 4px 7px; font-size: 11px; font-weight: 700; border: none; background: #fafaf9; color: var(--text-s); cursor: pointer; font-family: inherit; }
    .toggle-btn.active { background: var(--danger); color: #fff; }
    .item-disc-result { font-size: 11px; color: var(--danger); font-weight: 600; display: block; margin-top: 2px; }

    /* Total box */
    .total-box { border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .total-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-s); align-items: center; }
    .total-row input[type=number] { width: 120px; padding: 5px 8px; font-size: 13px; text-align: right; }
    .total-row .val { font-weight: 600; color: var(--text); }
    .total-row .red { color: var(--danger); font-weight: 600; }

    /* Diskon subtotal row */
    .disc-row { background: var(--danger-bg); border: 1px solid #f5c2c0; border-radius: var(--rs); padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
    .disc-row-top { display: flex; align-items: center; justify-content: space-between; }
    .disc-row-label { font-size: 13px; font-weight: 600; color: var(--danger); }
    .disc-controls { display: flex; align-items: center; gap: 6px; }
    .disc-controls input[type=number] { width: 100px; padding: 6px 8px; font-size: 13px; text-align: right; border-color: #f5c2c0; }
    .disc-type-wrap { display: flex; border: 1px solid var(--border); border-radius: var(--rs); overflow: hidden; }
    .disc-type-btn { padding: 6px 10px; font-size: 12px; font-weight: 700; border: none; background: #fafaf9; color: var(--text-s); cursor: pointer; font-family: inherit; }
    .disc-type-btn.active { background: var(--danger); color: #fff; }
    .disc-scope-wrap { display: flex; gap: 6px; }
    .scope-btn { flex: 1; padding: 5px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); border-radius: var(--rs); background: #fafaf9; color: var(--text-s); cursor: pointer; font-family: inherit; text-align: center; }
    .scope-btn.active { background: var(--danger); color: #fff; border-color: var(--danger); }
    .disc-amount-disp { font-size: 13px; font-weight: 700; color: var(--danger); text-align: right; }

    .total-final { display: flex; justify-content: space-between; font-size: 19px; font-weight: 700; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }
    .total-final span:last-child { color: var(--success-text); }

    /* Actions */
    .action-grid { display: flex; flex-direction: column; gap: 10px; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 13px; border: none; border-radius: var(--rs); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-wa { background: #25D366; color: #fff; }
    .btn-wa:hover { background: #1ebe5d; }
    .btn-copy { background: var(--surface); color: var(--text); border: 1px solid var(--border-s); }
    .btn-copy:hover { background: var(--bg); }
    .btn-olsera { background: var(--info-bg); color: var(--info-text); border: 1px solid var(--info-border); }
    .btn:active { transform: scale(.98); }
    .empty-state { text-align: center; padding: 2rem 1rem; color: var(--text-t); }
    .empty-state i { font-size: 36px; margin-bottom: 10px; display: block; }
    .empty-state p { font-size: 14px; }
    .copied-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
    .copied-toast.show { opacity: 1; }
    .divider { height: 1px; background: var(--border); margin: 14px 0; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div style="font-size:28px;margin-bottom:6px">⚙️</div>
    <h1>Admin Panel <span class="badge">vpknbr</span></h1>
    <p>Isi harga → diskon → total → balas WA</p>
  </div>

  <!-- Step 1 -->
  <div class="section">
    <div class="sec-title"><i class="ti ti-clipboard-text"></i> Step 1 — Paste Pesan WA</div>
    <textarea class="paste-area" id="pasteArea" placeholder="Paste pesan pesanan dari WA customer di sini..."></textarea>
    <button class="btn-parse" onclick="parseOrder()">
      <i class="ti ti-wand"></i> Parse Otomatis
    </button>
  </div>

  <!-- Step 2 -->
  <div class="section" id="orderSection" style="display:none">
    <div class="sec-title"><i class="ti ti-receipt"></i> Step 2 — Isi Harga & Diskon</div>
    <div class="info-grid" id="orderInfo"></div>
    <div class="divider"></div>

    <table class="prod-table">
      <colgroup>
        <col style="width:34%">
        <col style="width:28px">
        <col style="width:90px">
        <col style="width:85px">
      </colgroup>
      <thead>
        <tr>
          <th>Produk</th>
          <th style="text-align:center">Qty</th>
          <th class="r">Harga</th>
          <th class="r">Subtotal</th>
        </tr>
      </thead>
      <tbody id="priceTable"></tbody>
    </table>

    <div class="total-box">
      <div class="total-row">
        <span>Subtotal produk</span>
        <span class="val" id="subtotalDisp">Rp 0</span>
      </div>

      <!-- Diskon subtotal -->
      <div class="disc-row">
        <div class="disc-row-top">
          <span class="disc-row-label"><i class="ti ti-tag" style="font-size:13px"></i> Diskon</span>
          <span class="disc-amount-disp" id="discAmountDisp">—</span>
        </div>
        <!-- Scope: per item atau subtotal -->
        <div class="disc-scope-wrap">
          <button class="scope-btn" id="scope-subtotal" onclick="setScope('subtotal')">Dari Subtotal</button>
          <button class="scope-btn active" id="scope-item" onclick="setScope('item')" style="display:none">Per Item ↑</button>
        </div>
        <div class="disc-controls" id="discControls">
          <input type="number" id="discValue" placeholder="0" min="0" oninput="calcTotal()" />
          <div class="disc-type-wrap">
            <button class="disc-type-btn active" id="discPct" onclick="setDiscType('pct')">%</button>
            <button class="disc-type-btn" id="discNom" onclick="setDiscType('nom')">Rp</button>
          </div>
        </div>
      </div>

      <div class="total-row">
        <span>Ongkir</span>
        <input type="number" id="ongkirInput" placeholder="0" min="0" oninput="calcTotal()" />
      </div>

      <div class="total-final">
        <span>Total Tagihan</span>
        <span id="totalDisp">Rp 0</span>
      </div>
    </div>
  </div>

  <!-- Step 3 -->
  <div class="section" id="actionSection" style="display:none">
    <div class="sec-title"><i class="ti ti-send"></i> Step 3 — Kirim & Salin</div>
    <div class="action-grid">
      <button class="btn btn-wa" onclick="replyCustomer()">
        <i class="ti ti-brand-whatsapp"></i> Balas WA Customer dengan Total
      </button>
      <button class="btn btn-copy" onclick="copyInvoice()">
        <i class="ti ti-copy"></i> Salin Teks Invoice Lengkap
      </button>
      <button class="btn btn-olsera" onclick="copyOlsera()">
        <i class="ti ti-database"></i> Salin Format Input Olsera / Sistem
      </button>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <i class="ti ti-arrow-up"></i>
    <p>Paste pesan WA customer di atas,<br>lalu klik "Parse Otomatis"</p>
  </div>
</div>

<div class="copied-toast" id="toast">✓ Disalin!</div>

<script>
  let order = { name:'', wa:'', addr:'', products:[], kurir:'', time:'' };
  let discType  = 'pct';   // 'pct' | 'nom'
  let discScope = 'subtotal'; // 'subtotal' | 'item' (per item handled inline)

  function fmt(n) { return 'Rp ' + Math.round(n||0).toLocaleString('id-ID'); }
  function parseNum(v) { return parseFloat(String(v).replace(/[^\d.]/g,''))||0; }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = '✓ ' + msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function setDiscType(type) {
    discType = type;
    document.getElementById('discPct').classList.toggle('active', type==='pct');
    document.getElementById('discNom').classList.toggle('active', type==='nom');
    calcTotal();
  }

  function setScope(scope) {
    discScope = scope;
    document.getElementById('scope-subtotal').classList.toggle('active', scope==='subtotal');
    calcTotal();
  }

  // Hitung diskon per item
  function getItemDisc(i) {
    const p = order.products[i];
    const val = parseNum(p.discVal||0);
    const type = p.discType||'pct';
    const sub = parseNum(p.price) * p.qty;
    if (!val || !sub) return 0;
    return type==='pct' ? sub * val/100 : Math.min(val, sub);
  }

  function calcTotal() {
    const prods = order.products;
    const sub = prods.reduce((s,p) => s + parseNum(p.price)*p.qty, 0);

    // Diskon per item total
    const itemDiscTotal = prods.reduce((_,p,i) => _ + getItemDisc(i), 0);

    // Diskon subtotal
    const discVal = parseNum(document.getElementById('discValue')?.value||0);
    let subtotalDisc = 0;
    if (discScope === 'subtotal') {
      subtotalDisc = discType==='pct' ? (sub - itemDiscTotal)*discVal/100 : Math.min(discVal, sub-itemDiscTotal);
    }

    const totalDisc = itemDiscTotal + subtotalDisc;
    const ongkir = parseNum(document.getElementById('ongkirInput')?.value||0);
    const total = Math.max(0, sub - totalDisc + ongkir);

    document.getElementById('subtotalDisp').textContent = fmt(sub);
    document.getElementById('discAmountDisp').textContent = totalDisc > 0 ? '− '+fmt(totalDisc) : '—';
    document.getElementById('totalDisp').textContent = fmt(total);

    // Update per-item subtotal cells
    prods.forEach((p, i) => {
      const el = document.getElementById('psub_'+i);
      const pr = parseNum(p.price);
      if (el) {
        const itemSub = pr*p.qty - getItemDisc(i);
        el.textContent = pr > 0 ? fmt(itemSub) : '—';
        el.style.color = getItemDisc(i) > 0 ? 'var(--danger)' : 'var(--text)';
      }
    });
  }

  function parseOrder() {
    const raw = document.getElementById('pasteArea').value.trim();
    if (!raw) { alert('Paste dulu pesan WA customer.'); return; }
    order = { name:'', wa:'', addr:'', products:[], kurir:'', time:'' };

    // Bersihkan emoji & unicode
    function strip(s) {
      var result = '';
      for (var i = 0; i < s.length; i++) {
        var code = s.charCodeAt(i);
        if (code <= 255) result += s[i];
        else result += ' ';
      }
      return result.replace(/[-=]{3,}/g,' ').trim();
    }

    var lines = raw.split('\n');
    var addrMode = false, prodMode = false;

    for (var li = 0; li < lines.length; li++) {
      var l = lines[li].trim();
      if (!l) continue;
      var c = strip(l);
      if (!c) continue;

      var isNama       = /nama\s*[:\*:]/i.test(c);
      var isWA         = /\bwa\b|whatsapp|no\.?\s*wa|nomor/i.test(c);
      var isAlamat     = /alamat/i.test(c);
      var isProdukHdr  = /\bproduk\b/i.test(c) && !/^\d/.test(c);
      var isPengiriman = /pengiriman/i.test(c);
      var isItem       = /^\d+[\.\.)]\s+\S/.test(c);
      var isGarbage    = /subtotal|ongkir|total|diskon|mohon|terima|invoice|pesanan baru/i.test(c);

      if (isNama) {
        order.name = c.replace(/.*nama\s*[:\*:\s]+/i,'').replace(/\*/g,'').trim();
        addrMode=false; prodMode=false;
      } else if (isWA) {
        var m = c.match(/(\+?62[\d]{8,}|0[\d]{8,})/);
        if (m) { order.wa = m[1]; }
        else { var m2 = c.match(/[:\*]\s*([\d\+][\d\s\-]{8,})/); if (m2) order.wa = m2[1].replace(/[\s\-]/g,''); }
        addrMode=false; prodMode=false;
      } else if (isAlamat) {
        addrMode=true; prodMode=false;
        var inline = c.replace(/.*alamat\s*[:\*:\s]+/i,'').replace(/\*/g,'').trim();
        if (inline) order.addr = inline;
      } else if (isProdukHdr) {
        addrMode=false; prodMode=true;
      } else if (isPengiriman) {
        addrMode=false; prodMode=false;
        order.kurir = c.replace(/.*pengiriman\s*[:\*:\s]+/i,'').replace(/\*/g,'').trim();
      } else if (isItem && !isGarbage) {
        addrMode=false; prodMode=true;
        var clean = c.replace(/^\d+[\.\.)]\s*/,'').replace(/\*/g,'');
        var qtyM = clean.match(/[\u2014\-\u2013]\s*(\d+)\s*pcs/i)
                || clean.match(/\bx\s*(\d+)/i)
                || clean.match(/(\d+)\s*pcs/i);
        var qty = qtyM ? parseInt(qtyM[1]) : 1;
        var name = clean
          .replace(/[\u2014\-\u2013]\s*\d+\s*pcs.*/i,'')
          .replace(/\bx\s*\d+.*/i,'')
          .replace(/\d+\s*pcs.*/i,'')
          .replace(/Rp[\s\d.,]+/g,'')
          .trim();
        if (name && name.length > 1) {
          order.products.push({name:name, qty:qty, price:'', discVal:'', discType:'pct'});
        }
      } else if (addrMode && !isGarbage && c.length > 2) {
        order.addr += (order.addr ? ', ' : '') + c.replace(/\*/g,'').trim();
      }
    }

    if (!order.products.length) {
      alert('Produk tidak terbaca.\n\nPastikan ada baris: 1. nama produk — N pcs');
      return;
    }
    renderOrderPanel();
  }




  function renderOrderPanel() {
    document.getElementById('emptyState').style.display='none';
    document.getElementById('orderSection').style.display='block';
    document.getElementById('actionSection').style.display='block';
    document.getElementById('orderInfo').innerHTML=`
      <span class="info-label">Nama</span><span class="info-value">${order.name||'—'}</span>
      <span class="info-label">WA</span><span class="info-value">${order.wa||'—'}</span>
      <span class="info-label">Kurir</span><span class="info-value">${order.kurir||'—'}</span>
      <span class="info-label">Alamat</span><span class="info-value">${order.addr||'—'}</span>`;

    const tbody=document.getElementById('priceTable');
    tbody.innerHTML='';
    order.products.forEach((p,i)=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td>
          <div class="prod-name">${p.name}</div>
          <div class="item-disc-wrap">
            <input class="item-disc-input" type="number" placeholder="Diskon" min="0"
              value="${p.discVal}"
              oninput="order.products[${i}].discVal=this.value;calcTotal()" />
            <div class="toggle-wrap">
              <button class="toggle-btn ${p.discType==='pct'?'active':''}" onclick="setItemDiscType(${i},'pct')">%</button>
              <button class="toggle-btn ${p.discType==='nom'?'active':''}" onclick="setItemDiscType(${i},'nom')">Rp</button>
            </div>
          </div>
          <span class="item-disc-result" id="idisc_${i}"></span>
        </td>
        <td class="prod-qty">${p.qty}</td>
        <td>
          <input class="price-input" type="number" placeholder="0" min="0"
            value="${p.price}"
            oninput="order.products[${i}].price=this.value;calcTotal()" />
        </td>
        <td class="subtotal-cell" id="psub_${i}">—</td>`;
      tbody.appendChild(tr);
    });

    document.getElementById('ongkirInput').value='';
    document.getElementById('discValue').value='';
    discType='pct'; discScope='subtotal';
    document.getElementById('discPct').classList.add('active');
    document.getElementById('discNom').classList.remove('active');
    document.getElementById('scope-subtotal').classList.add('active');
    calcTotal();
  }

  function setItemDiscType(i, type) {
    order.products[i].discType=type;
    // update toggle UI
    const row=document.getElementById('priceTable').rows[i];
    row.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
    row.querySelectorAll('.toggle-btn')[type==='pct'?0:1].classList.add('active');
    calcTotal();
    // show item disc result
    const d=getItemDisc(i);
    const el=document.getElementById('idisc_'+i);
    if(el) el.textContent=d>0?'− '+fmt(d):'';
  }

  // Expose calcTotal to update idisc labels too
  const _calcTotal = calcTotal;
  function calcTotal() {
    _calcTotal();
    order.products.forEach((_,i)=>{
      const el=document.getElementById('idisc_'+i);
      const d=getItemDisc(i);
      if(el) el.textContent=d>0?'− '+fmt(d):'';
    });
  }

  function getTotals() {
    const sub=order.products.reduce((s,p)=>s+parseNum(p.price)*p.qty,0);
    const itemDiscTotal=order.products.reduce((_,p,i)=>_+getItemDisc(i),0);
    const discVal=parseNum(document.getElementById('discValue')?.value||0);
    let subtotalDisc=0;
    if(discScope==='subtotal') subtotalDisc=discType==='pct'?(sub-itemDiscTotal)*discVal/100:Math.min(discVal,sub-itemDiscTotal);
    const totalDisc=itemDiscTotal+subtotalDisc;
    const ongkir=parseNum(document.getElementById('ongkirInput')?.value||0);
    return { sub, itemDiscTotal, subtotalDisc, totalDisc, ongkir, total:Math.max(0,sub-totalDisc+ongkir) };
  }

  function buildInvoiceText() {
    const {sub,itemDiscTotal,subtotalDisc,totalDisc,ongkir,total}=getTotals();
    const now=new Date().toLocaleString('id-ID',{dateStyle:'short',timeStyle:'short'});
    let t='🧾 *INVOICE PESANAN*\n━━━━━━━━━━━━━━━━━━━\n';
    t+=`🕐 ${now}\n`;
    if(order.name) t+=`👤 *Nama:* ${order.name}\n`;
    if(order.addr) t+=`📍 *Alamat:* ${order.addr}\n`;
    t+='\n🛒 *Rincian Produk:*\n';
    order.products.forEach((p,i)=>{
      const pr=parseNum(p.price);
      const disc=getItemDisc(i);
      if(pr>0){
        t+=`${i+1}. ${p.name}\n   ${p.qty} x ${fmt(pr)} = ${fmt(pr*p.qty)}`;
        if(disc>0) t+=` *(diskon − ${fmt(disc)})*`;
        t+='\n';
      } else { t+=`${i+1}. ${p.name} — ${p.qty} pcs\n`; }
    });
    t+=`\n📦 Subtotal produk : ${fmt(sub)}\n`;
    if(itemDiscTotal>0) t+=`🏷️ Diskon item      : − ${fmt(itemDiscTotal)}\n`;
    if(subtotalDisc>0)  t+=`🏷️ Diskon subtotal  : − ${fmt(subtotalDisc)}\n`;
    if(totalDisc>0)     t+=`✂️ Total diskon     : − ${fmt(totalDisc)}\n`;
    t+=`🚚 Ongkir ${order.kurir||''} : ${ongkir>0?fmt(ongkir):'Gratis'}\n`;
    t+='─────────────────────\n';
    t+=`💰 *TOTAL TAGIHAN : ${fmt(total)}*\n`;
    t+='━━━━━━━━━━━━━━━━━━━\n';
    t+='_Mohon transfer sesuai nominal. Terima kasih!_ 🙏';
    return t;
  }

  function buildOlseraText() {
    const {sub,totalDisc,ongkir,total}=getTotals();
    const now=new Date().toLocaleString('id-ID',{dateStyle:'short',timeStyle:'short'});
    let t=`=== INPUT OLSERA ===\nTanggal   : ${now}\nCustomer  : ${order.name}\nWA        : ${order.wa}\nAlamat    : ${order.addr}\nKurir     : ${order.kurir}\nOngkir    : ${fmt(ongkir)}\n\n--- Produk ---\n`;
    order.products.forEach((p,i)=>{
      const pr=parseNum(p.price); const disc=getItemDisc(i);
      t+=`${i+1}. ${p.name}\n   Qty    : ${p.qty}\n   Harga  : ${fmt(pr)}\n   Diskon : ${disc>0?'− '+fmt(disc):'-'}\n   Sub    : ${fmt(pr*p.qty-disc)}\n`;
    });
    t+=`\n--- Total ---\nSubtotal  : ${fmt(sub)}\nDiskon    : ${totalDisc>0?'− '+fmt(totalDisc):'-'}\nOngkir    : ${fmt(ongkir)}\nTOTAL     : ${fmt(total)}\n===================`;
    return t;
  }

  function replyCustomer() {
    if(!order.wa){alert('Nomor WA customer tidak ditemukan.');return;}
    const wa=order.wa.replace(/\D/g,'');
    const waFmt=wa.startsWith('0')?'62'+wa.slice(1):wa;
    window.open('https://wa.me/'+waFmt+'?text='+encodeURIComponent(buildInvoiceText()),'_blank');
  }

  function copyInvoice() {
    const t=buildInvoiceText();
    navigator.clipboard?navigator.clipboard.writeText(t).then(()=>showToast('Invoice disalin!')):fallbackCopy(t,'Invoice disalin!');
  }

  function copyOlsera() {
    const t=buildOlseraText();
    navigator.clipboard?navigator.clipboard.writeText(t).then(()=>showToast('Format Olsera disalin!')):fallbackCopy(t,'Format Olsera disalin!');
  }

  function fallbackCopy(text,msg) {
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast(msg||'Disalin!');
  }
</script>
</body>
</html>
